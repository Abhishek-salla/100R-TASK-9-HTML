<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HTML Form Elements Practice</title>

<style>
    body {
        font-family: Arial, sans-serif;
        background-color: #f4f4f4;
        margin: 20px;
    }

    .container {
        width: 600px;
        margin: auto;
        background: white;
        padding: 20px;
        border-radius: 10px;
        box-shadow: 0 0 10px gray;
    }

    h1 {
        text-align: center;
        color: #333;
    }

    label {
        font-weight: bold;
        display: block;
        margin-top: 10px;
    }

    input, textarea {
        width: 100%;
        padding: 8px;
        margin-top: 5px;
        margin-bottom: 10px;
        border: 1px solid #ccc;
        border-radius: 5px;
    }

    .inline-group {
        display: inline-block;
        margin-right: 15px;
    }

    .buttons {
        text-align: center;
    }

    button {
        padding: 10px 20px;
        margin: 10px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
    }

    .submit-btn {
        background-color: green;
        color: white;
    }

    .reset-btn {
        background-color: red;
        color: white;
    }
</style>
</head>

<body>

<div class="container">

<h1>User Information Form</h1>

<form>

    <!-- Text Input -->
    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="Enter your full name" required>

    <!-- Password Input -->
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Enter password" required>

    <!-- Email Input -->
    <label for="email">Email</label>
    <input type="email" id="email" placeholder="Enter your email" required>

    <!-- Telephone Input -->
    <label for="phone">Phone Number</label>
    <input type="tel" id="phone" placeholder="Enter phone number" required>

    <!-- URL Input -->
    <label for="website">Website URL</label>
    <input type="url" id="website" placeholder="https://example.com" required>

    <!-- Date Input -->
    <label for="birthdate">Date of Birth</label>
    <input type="date" id="birthdate" required>

    <!-- Datetime-local Input -->
    <label for="appointment">Appointment Date & Time</label>
    <input type="datetime-local" id="appointment" required>

    <!-- File Input -->
    <label for="resume">Upload Resume</label>
    <input type="file" id="resume" required>

    <!-- Radio Buttons -->
    <label>Gender</label>

    <span class="inline-group">
        <input type="radio" name="gender" required> Male
    </span>

    <span class="inline-group">
        <input type="radio" name="gender"> Female
    </span>

    <span class="inline-group">
        <input type="radio" name="gender"> Other
    </span>

    <br><br>

    <!-- Checkbox -->
    <label>Skills</label>

    <span class="inline-group">
        <input type="checkbox"> HTML
    </span>

    <span class="inline-group">
        <input type="checkbox"> CSS
    </span>

    <span class="inline-group">
        <input type="checkbox"> JavaScript
    </span>

    <br><br>

    <!-- Range Input -->
    <label for="experience">Experience Level (0-10)</label>
    <input type="range" id="experience" min="0" max="10">

    <!-- Color Input -->
    <label for="color">Favorite Color</label>
    <input type="color" id="color">

    <!-- Submit and Reset Buttons -->
    <div class="buttons">
        <button type="submit" class="submit-btn">Submit</button>
        <button type="reset" class="reset-btn">Reset</button>
    </div>

</form>

</div>

</body>
</html>
